name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  create-release:
    name: create draft release
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Create draft release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          if gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1; then
            gh release delete "$GITHUB_REF_NAME" --yes
          fi
          gh release create "$GITHUB_REF_NAME" \
            --draft \
            --title "codex-zai-proxy ${GITHUB_REF_NAME}" \
            --notes ""

  build:
    name: build ${{ matrix.asset }}
    needs: create-release
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            target: aarch64-apple-darwin
            asset: codex-zai-proxy-macos-arm64
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            asset: codex-zai-proxy-linux-x86_64
          - os: windows-2025
            target: x86_64-pc-windows-msvc
            asset: codex-zai-proxy-windows-x86_64.exe

    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build
        run: cargo build --locked --release --target "${{ matrix.target }}"
        shell: bash

      - name: Prepare binary
        run: |
          set -euo pipefail
          mkdir -p dist
          source="target/${{ matrix.target }}/release/codex-zai-proxy"
          if [[ "${{ matrix.asset }}" == *.exe ]]; then
            source="${source}.exe"
          fi
          cp "$source" "dist/${{ matrix.asset }}"
        shell: bash

      - name: Upload binary
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload "$GITHUB_REF_NAME" "dist/${{ matrix.asset }}" --clobber
        shell: bash

  publish:
    name: publish release
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Publish draft
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release edit "$GITHUB_REF_NAME" --draft=false --latest
