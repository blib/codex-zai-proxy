name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            exe: ""
          - os: macos-13
            target: x86_64-apple-darwin
            exe: ""
          - os: macos-14
            target: aarch64-apple-darwin
            exe: ""
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            exe: ".exe"

    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build release binary
        run: cargo build --locked --release --target "${{ matrix.target }}"
        shell: bash

      - name: Package release asset
        run: >
          python scripts/package-release.py
          --target "${{ matrix.target }}"
          --archive-name "codex-zai-proxy-${{ github.ref_name }}-${{ matrix.target }}"
          --binary-name "codex-zai-proxy${{ matrix.exe }}"
        shell: bash

      - uses: actions/upload-artifact@v5
        with:
          name: codex-zai-proxy-${{ github.ref_name }}-${{ matrix.target }}
          path: dist/*
          if-no-files-found: error

  release:
    name: publish GitHub release
    runs-on: ubuntu-latest
    needs: build
    timeout-minutes: 10
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v6

      - uses: actions/download-artifact@v8
        with:
          path: release-assets

      - name: Verify checksums
        run: |
          set -euo pipefail
          while IFS= read -r checksum; do
            (cd "$(dirname "$checksum")" && sha256sum -c "$(basename "$checksum")")
          done < <(find release-assets -name '*.sha256' | sort)

      - name: Publish release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          notes_file="docs/release-notes/${GITHUB_REF_NAME}.md"
          release_args=(--title "codex-zai-proxy ${GITHUB_REF_NAME}" --verify-tag)
          if [[ -f "$notes_file" ]]; then
            release_args+=(--notes-file "$notes_file")
          else
            release_args+=(--generate-notes)
          fi

          mapfile -t assets < <(find release-assets -type f | sort)
          gh release create "$GITHUB_REF_NAME" "${assets[@]}" "${release_args[@]}"
