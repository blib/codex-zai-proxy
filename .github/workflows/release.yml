name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  create-release:
    name: create draft release
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v6

      - name: Create draft release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          notes_file="docs/release-notes/${GITHUB_REF_NAME}.md"
          release_args=(--draft --title "codex-zai-proxy ${GITHUB_REF_NAME}" --verify-tag)
          if [[ -f "$notes_file" ]]; then
            release_args+=(--notes-file "$notes_file")
          else
            release_args+=(--generate-notes)
          fi

          if gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1; then
            gh release delete "$GITHUB_REF_NAME" --yes
          fi
          gh release create "$GITHUB_REF_NAME" "${release_args[@]}"

  build:
    name: build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    needs: create-release
    timeout-minutes: 30
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            exe: ""
          - os: macos-15-intel
            target: x86_64-apple-darwin
            exe: ""
          - os: macos-14
            target: aarch64-apple-darwin
            exe: ""
          - os: windows-2025
            target: x86_64-pc-windows-msvc
            exe: ".exe"

    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build release binary
        run: cargo build --locked --release --target "${{ matrix.target }}"
        shell: bash

      - name: Package release asset
        run: >
          python scripts/package-release.py
          --target "${{ matrix.target }}"
          --archive-name "codex-zai-proxy-${{ github.ref_name }}-${{ matrix.target }}"
          --binary-name "codex-zai-proxy${{ matrix.exe }}"
        shell: bash

      - name: Verify local checksum
        run: python scripts/verify-checksums.py dist
        shell: bash

      - name: Upload release assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload "$GITHUB_REF_NAME" dist/* --clobber
        shell: bash

  release:
    name: publish draft release
    runs-on: ubuntu-latest
    needs: build
    timeout-minutes: 10
    permissions:
      contents: write

    steps:
      - name: Publish release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release edit "$GITHUB_REF_NAME" --draft=false --latest
